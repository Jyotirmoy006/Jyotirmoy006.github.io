<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Factory V6 - ElectroKolkata</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
            /* BRIGHT INDUSTRIAL HAZE GRADIENT */
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
        }
        
        /* Dashboard Styling */
        #dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #333;
            padding: 20px;
            border-radius: 12px;
            border-left: 6px solid #ff0000;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; color: #111; letter-spacing: 1px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .highlight { color: #d00000; font-weight: bold; }
        .metric-big { font-size: 1.6rem; font-weight: 800; color: #222; }
        
        input[type="number"] {
            background: #f5f5f5; border: 1px solid #ccc; color: #333;
            padding: 6px; width: 80px; border-radius: 4px; font-weight: bold;
        }
        
        /* Status Dots */
        .status-dot { height: 12px; width: 12px; background-color: #ccc; border-radius: 50%; display: inline-block; margin-right: 5px; border: 1px solid #999;}
        .active { background-color: #00e600; box-shadow: 0 0 8px #00e600; border-color: #00cc00; }
        
        #instructions {
            position: absolute; bottom: 15px; right: 25px;
            color: rgba(255,255,255,0.8); font-size: 0.9rem; font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="dashboard">
        <h2>🏭 Factory Control</h2>
        
        <div class="stat-row" style="align-items: center;">
            <label>Target Order:</label>
            <input type="number" id="orderInput" value="500" step="100">
        </div>
        <hr style="border-color: #eee; margin: 15px 0;">

        <div class="stat-row">
            <span>Status:</span>
            <span id="systemState" class="highlight">Energy Saving</span>
        </div>
        
        <div class="stat-row">
            <span>Active Belts:</span>
            <span id="activeBelts">1 / 4</span>
        </div>

        <div style="background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center;">
            <div style="font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 4px;">Production Rate</div>
            <div id="ppmDisplay" class="metric-big">12 PPM</div>
        </div>

        <div style="margin-top: 10px;">
            <div style="margin-bottom: 5px; font-size: 0.8rem; color: #666;">Line Indicators:</div>
            <div id="led1" class="status-dot active"></div>
            <div id="led2" class="status-dot"></div>
            <div id="led3" class="status-dot"></div>
            <div id="led4" class="status-dot"></div>
        </div>
    </div>
    
    <div id="instructions">Simulated Environment: ElectroKolkata V6</div>

    <script>
        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        // No Fog - Crystal Clear View
        
        // --- CAMERA PERFECTED ZOOM ---
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Positioned in the "Goldilocks Zone" (Not too close, not too far)
        camera.position.set(25, 20, 35); 
        camera.lookAt(0, 0, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor( 0x000000, 0 ); // Transparent for CSS Gradient
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 50, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        // Large shadow area
        const d = 50;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // --- 2. ENVIRONMENT (WALLS & FLOOR) ---
        
        // The Floor (Clean Concrete)
        const planeGeo = new THREE.PlaneGeometry(200, 200);
        const planeMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, depthWrite: false });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.1;
        plane.receiveShadow = true;
        scene.add(plane);

        // The "Hangar" Wall Effect (Wireframe Dome)
        const domeGeo = new THREE.SphereGeometry(90, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5);
        const domeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 });
        const dome = new THREE.Mesh(domeGeo, domeMat);
        dome.position.y = -5;
        scene.add(dome);

        // --- 3. ASSETS ---

        function createCrate(x, z) {
            const geo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
            const mat = new THREE.MeshPhongMaterial({ color: 0x8B5A2B });
            const crate = new THREE.Mesh(geo, mat);
            crate.position.set(x, 1.25, z);
            crate.castShadow = true;
            
            // Detail Lines
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x5c3a1e }));
            crate.add(line);
            
            scene.add(crate);
        }

        function createRedRobot(x, z) {
            const armGroup = new THREE.Group();
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1, 16), new THREE.MeshPhongMaterial({color: 0x333333}));
            base.position.set(x + 1.2, 2.5, z);
            armGroup.add(base);

            const armGeo = new THREE.BoxGeometry(1.8, 0.3, 0.3);
            const armMat = new THREE.MeshPhongMaterial({ color: 0xe60000 }); // Bright Red
            const arm = new THREE.Mesh(armGeo, armMat);
            arm.position.set(x + 0.5, 3.2, z);
            armGroup.add(arm);

            const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 0.8), new THREE.MeshPhongMaterial({color: 0x222222}));
            nozzle.position.set(x, 2.8, z);
            armGroup.add(nozzle);

            return armGroup;
        }

        function createTruck(x, z) {
            const truckGroup = new THREE.Group();
            
            // Cargo
            const cargo = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.5, 5), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            cargo.position.set(0, 1.5, 0);
            cargo.castShadow = true;
            truckGroup.add(cargo);

            // Cab
            const cab = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2, 2), new THREE.MeshPhongMaterial({ color: 0x0066cc }));
            cab.position.set(0, 1.25, 3.5);
            cab.castShadow = true;
            truckGroup.add(cab);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.4, 16);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.rotation.z = Math.PI/2; w1.position.set(0, 0.4, -1.5);
            const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.rotation.z = Math.PI/2; w2.position.set(0, 0.4, 1.5);
            const w3 = new THREE.Mesh(wheelGeo, wheelMat); w3.rotation.z = Math.PI/2; w3.position.set(0, 0.4, 3.5);
            truckGroup.add(w1); truckGroup.add(w2); truckGroup.add(w3);

            truckGroup.position.set(x, 0, z);
            scene.add(truckGroup);
        }

        // --- 4. BUILD FACTORY LINES ---
        const beltGroup = new THREE.Group();
        const beltXPositions = [-6, -2, 2, 6];
        
        beltXPositions.forEach(x => {
            // Belt
            const belt = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 45), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            belt.position.set(x, 0, -5);
            belt.receiveShadow = true;
            beltGroup.add(belt);

            createCrate(x, -24); // Start
            createTruck(x, 20);  // End

            // Lens Station (Translucent Blue)
            const lensBox = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 3), new THREE.MeshPhongMaterial({ color: 0x00d2ff, opacity: 0.25, transparent: true, side: THREE.DoubleSide }));
            lensBox.position.set(x, 1, -5);
            const lensEdges = new THREE.LineSegments(new THREE.EdgesGeometry(lensBox.geometry), new THREE.LineBasicMaterial({ color: 0x00aadd }));
            lensBox.add(lensEdges);
            beltGroup.add(lensBox);

            // Solder Station (Translucent Orange)
            const solderBox = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 3), new THREE.MeshPhongMaterial({ color: 0xffaa00, opacity: 0.25, transparent: true, side: THREE.DoubleSide }));
            solderBox.position.set(x, 1, 5);
            const solderEdges = new THREE.LineSegments(new THREE.EdgesGeometry(solderBox.geometry), new THREE.LineBasicMaterial({ color: 0xcc8800 }));
            solderBox.add(solderEdges);
            beltGroup.add(solderBox);

            beltGroup.add(createRedRobot(x, 5));
        });
        scene.add(beltGroup);


        // --- 5. SIMULATION LOGIC ---
        const products = [];
        let spawnRate = 0; 
        let beltSpeed = 0;
        let activeLanes = 1;
        let ppm = 0;

        function spawnProduct(laneIndex) {
            const group = new THREE.Group();
            
            // Case
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.8), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            box.castShadow = true;
            group.add(box);

            // Lens
            const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16), new THREE.MeshPhongMaterial({ color: 0x00ffff }));
            lens.rotation.x = Math.PI / 2; lens.position.y = 0.21; lens.visible = false; lens.name = "lens";
            group.add(lens);

            // Solder
            const cap = new THREE.Mesh(new THREE.RingGeometry(0.26, 0.3, 16), new THREE.MeshBasicMaterial({ color: 0xffd700, side: THREE.DoubleSide }));
            cap.rotation.x = -Math.PI / 2; cap.position.y = 0.22; cap.visible = false; cap.name = "cap";
            group.add(cap);

            group.position.set(beltXPositions[laneIndex], 0.4, -22); 
            scene.add(group);
            products.push(group);
        }

        // --- 6. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (spawnRate > 0 && Math.random() < spawnRate) {
                const laneIdx = Math.floor(Math.random() * activeLanes);
                spawnProduct(laneIdx);
            }

            for (let i = products.length - 1; i >= 0; i--) {
                const p = products[i];
                p.position.z += beltSpeed;

                if (p.position.z > -5 && p.position.z < -4) {
                    if(p.getObjectByName("lens")) p.getObjectByName("lens").visible = true;
                }
                if (p.position.z > 5 && p.position.z < 6) {
                    if(p.getObjectByName("cap")) p.getObjectByName("cap").visible = true;
                }

                if (p.position.z > 17) {
                    scene.remove(p);
                    products.splice(i, 1);
                }
            }
            
            // Slow rotation of the hangar dome for effect
            dome.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }
        

        // --- 7. CONTROLS ---
        const input = document.getElementById('orderInput');
        const ppmDisplay = document.getElementById('ppmDisplay');
        
        function updateSimulation() {
            const units = parseInt(input.value);
            
            if (units < 1000) {
                activeLanes = 1; spawnRate = 0.01; beltSpeed = 0.05;
                updateStatus("Energy Saving", 1);
                ppm = 12;
            } else if (units < 3000) {
                activeLanes = 2; spawnRate = 0.03; beltSpeed = 0.09;
                updateStatus("Normal", 2);
                ppm = 45;
            } else if (units < 5000) {
                activeLanes = 3; spawnRate = 0.05; beltSpeed = 0.14;
                updateStatus("High Output", 3);
                ppm = 92;
            } else {
                activeLanes = 4; spawnRate = 0.10; beltSpeed = 0.22;
                updateStatus("SURGE MODE", 4);
                ppm = 185;
            }
            
            ppmDisplay.innerText = ppm + " PPM";
        }
        

        function updateStatus(stateText, count) {
            document.getElementById('systemState').innerText = stateText;
            document.getElementById('activeBelts').innerText = count + " / 4";
            for(let i=1; i<=4; i++) {
                const led = document.getElementById('led'+i);
                if (i <= count) led.classList.add('active');
                else led.classList.remove('active');
            }
        }

        input.addEventListener('input', updateSimulation);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateSimulation();
        animate();
        // ... existing animation code ...

        // --- 7. AUTO-SYNC LOGIC (Add this at the very end) ---
        // --- 7. REAL-TIME SYNC ENGINE ---
        
        function syncDemand(value) {
            if (!value) return;
            
            // Update the Input Box
            input.value = value;
            
            // Trigger the Simulation Logic
            updateSimulation();
            
            console.log("🔴 Live Sync Received: " + value);
        }

        // A. Check for URL data (Initial Launch)
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('order')) {
                syncDemand(params.get('order'));
            }
        };

        // B. Listen for Live Updates (Continuous)
        window.addEventListener('storage', (event) => {
            if (event.key === 'live_factory_demand') {
                syncDemand(event.newValue);
            }
        });

        // Start
        updateSimulation();
        animate();
    </script>
</body>
</html>
